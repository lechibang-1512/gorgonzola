name: Build Linux Precompiled Binaries

on:
  workflow_dispatch:
  workflow_call:
    inputs:
      isNightly:
        type: boolean
        required: true
        default: false
      x86_64Only:
        type: boolean
        required: false
        default: false

env:
  PIP_BREAK_SYSTEM_PACKAGES: 1

permissions:
  contents: read

jobs:
  build-precompiled-bin-x86_64:
    runs-on: gorgonzola-self-hosted-linux-building-x86_64
    steps:
      - uses: actions/checkout@v4

      - name: Update nightly version
        if: ${{ inputs.isNightly == true }}
        run: |
          /opt/python/cp310-cp310/bin/python -m pip install packaging
          /opt/python/cp310-cp310/bin/python update-nightly-build-version.py
        working-directory: scripts

      - name: Build precompiled binaries
        run: |
          make NUM_THREADS=$(nproc)
          make install

      - name: Collect artifacts
        run: |
          mv install/include/gorgonzola.h .
          mv install/include/gorgonzola.hpp .
          mv install/lib64/libgorgonzola.so .
          mv install/bin/gorgonzola .

      - name: Create tarball
        run: |
          tar -czvf libgorgonzola-linux-x86_64.tar.gz gorgonzola.h gorgonzola.hpp libgorgonzola.so
          tar -czvf gorgonzola_cli-linux-x86_64.tar.gz gorgonzola

      - uses: actions/upload-artifact@v4
        with:
          name: libgorgonzola-linux-x86_64
          path: libgorgonzola-linux-x86_64.tar.gz

      - uses: actions/upload-artifact@v4
        with:
          name: gorgonzola_cli-linux-x86_64
          path: gorgonzola_cli-linux-x86_64.tar.gz

  build-precompiled-bin-aarch64:
    if: ${{ inputs.x86_64Only != true }}
    runs-on: gorgonzola-self-hosted-linux-building-aarch64
    steps:
      - uses: actions/checkout@v4

      - name: Update nightly version
        if: ${{ inputs.isNightly == true }}
        run: |
          /opt/python/cp310-cp310/bin/python -m pip install packaging
          /opt/python/cp310-cp310/bin/python update-nightly-build-version.py
        working-directory: scripts

      - name: Build precompiled binaries
        run: |
          make NUM_THREADS=$(nproc)
          make install

      - name: Collect artifacts
        run: |
          mv install/include/gorgonzola.h .
          mv install/include/gorgonzola.hpp .
          mv install/lib64/libgorgonzola.so .
          mv install/bin/gorgonzola .

      - name: Create tarball
        run: |
          tar -czvf libgorgonzola-linux-aarch64.tar.gz gorgonzola.h gorgonzola.hpp libgorgonzola.so
          tar -czvf gorgonzola_cli-linux-aarch64.tar.gz gorgonzola

      - uses: actions/upload-artifact@v4
        with:
          name: libgorgonzola-linux-aarch64
          path: libgorgonzola-linux-aarch64.tar.gz

      - uses: actions/upload-artifact@v4
        with:
          name: gorgonzola_cli-linux-aarch64
          path: gorgonzola_cli-linux-aarch64.tar.gz

  build-precompiled-bin-android-armv8a:
    if: ${{ inputs.x86_64Only != true }}
    runs-on: gorgonzola-self-hosted-testing
    steps:
      - uses: actions/checkout@v4

      - name: Update nightly version
        if: ${{ inputs.isNightly == true }}
        run: |
          python3 -m pip install packaging
          python3 update-nightly-build-version.py
        working-directory: scripts

      - name: Build precompiled binaries
        run: |
          mkdir build
          cd build
          cmake -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_ROOT/build/cmake/android.toolchain.cmake -DANDROID_ABI=arm64-v8a  ..
          make -j$(nproc)
          cd ..
          cmake --install build --prefix install
    
      - name: Collect artifacts
        run: |
          mv install/include/gorgonzola.h .
          mv install/include/gorgonzola.hpp .
          mv install/lib/libgorgonzola.so .
          mv install/bin/gorgonzola .
        
      - name: Create tarball
        run: |
          tar -czvf libgorgonzola-android-armv8a.tar.gz gorgonzola.h gorgonzola.hpp libgorgonzola.so
          tar -czvf gorgonzola_cli-android-armv8a.tar.gz gorgonzola
        
      - uses: actions/upload-artifact@v4
        with:
          name: libgorgonzola-android-armv8a
          path: libgorgonzola-android-armv8a.tar.gz
        
      - uses: actions/upload-artifact@v4
        with:
          name: gorgonzola_cli-android-armv8a
          path: gorgonzola_cli-android-armv8a.tar.gz
