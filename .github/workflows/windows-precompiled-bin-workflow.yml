name: Build Windows Precompiled Binaries

on:
  workflow_dispatch:
  workflow_call:
    inputs:
      isNightly:
        type: boolean
        required: true
        default: false

permissions:
  contents: read

jobs:
  build-precompiled-bin:
    runs-on: self-hosted-windows
    steps:
      - uses: actions/checkout@v4

      - name: Update nightly version
        if: ${{ inputs.isNightly == true }}
        run: |
          pip3 install packaging
          python3 update-nightly-build-version.py
        working-directory: ./scripts

      - name: Build precompiled binaries
        shell: cmd
        run: |
          call "C:\Program Files (x86)\Microsoft Visual Studio\2022\BuildTools\VC\Auxiliary\Build\vcvars64.bat"
          make NUM_THREADS=%NUMBER_OF_PROCESSORS%
          make install

      - name: Collect artifacts
        shell: cmd
        run: |
          move install\include\gorgonzola.h
          move install\include\gorgonzola.hpp
          move install\bin\gorgonzola_shared.dll
          move install\lib\gorgonzola_shared.lib
          move install\bin\gorgonzola_shell.exe gorgonzola.exe

      - uses: actions/upload-artifact@v4
        with:
          name: libgorgonzola-windows-x86_64
          path: |
            gorgonzola.h
            gorgonzola.hpp
            gorgonzola_shared.dll
            gorgonzola_shared.lib

      - uses: actions/upload-artifact@v4
        with:
          name: gorgonzola_cli-windows-x86_64
          path: gorgonzola.exe
